<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daw Task - Gestor de Tareas</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Pantalla de Login -->
    <div id="login-screen" class="screen active">
        <div class="login-card">
            <h1>Bienvenido a <span>Daw Task</span></h1>
            <p>Inicia sesión para gestionar tus tareas</p>
            <form id="login-form">
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" required placeholder="Ej: juan85">
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <div id="login-error" class="error-message"></div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
        </div>
    </div>

    <!-- Pantalla Principal (Dashboard) -->
    <div id="dashboard-screen" class="screen">
        <nav class="navbar">
            <div class="logo">Daw Task</div>
            <div class="user-info">
                <span id="current-username"></span>
                <span id="current-role" class="badge"></span>
                <button id="logout-btn" class="btn-secondary">Salir</button>
            </div>
        </nav>

        <main class="dashboard-content">
            <header class="dashboard-header">
                <h2>Mis Tareas</h2>
                <button id="open-modal-btn" class="btn-primary">+ Nueva Tarea</button>
            </header>

            <div class="kanban-board">
                <!-- Columna Pendiente -->
                <div class="kanban-column" id="col-pendiente">
                    <h3>Pendientes</h3>
                    <div class="kanban-cards" id="list-pendiente"></div>
                </div>

                <!-- Columna En Progreso -->
                <div class="kanban-column" id="col-en-progreso">
                    <h3>En Progreso</h3>
                    <div class="kanban-cards" id="list-en-progreso"></div>
                </div>

                <!-- Columna Completada -->
                <div class="kanban-column" id="col-completada">
                    <h3>Completadas</h3>
                    <div class="kanban-cards" id="list-completada"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Nueva Tarea -->
    <div id="task-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal-btn">&times;</span>
            <h2>Crear Nueva Tarea</h2>
            <form id="task-form">
                <div class="input-group">
                    <label for="task-title">Título</label>
                    <input type="text" id="task-title" required placeholder="Ej: Configurar base de datos">
                </div>
                <div class="input-group">
                    <label for="task-desc">Descripción</label>
                    <textarea id="task-desc" required placeholder="Detalles de la tarea..." rows="3"></textarea>
                </div>
                <div class="input-group">
                    <label for="task-date">Fecha de Vencimiento</label>
                    <input type="date" id="task-date" required>
                </div>
                <!-- NO incluimos el estado, respetando la restricción del backend -->
                <div id="task-error" class="error-message"></div>
                <button type="submit" class="btn-primary w-full">Guardar Tarea</button>
            </form>
        </div>
    </div>

    <!-- Modal Editar Tarea (Solo Admin) -->
    <div id="edit-task-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-edit-modal-btn">&times;</span>
            <h2>Editar Tarea</h2>
            <form id="edit-task-form">
                <input type="hidden" id="edit-task-id">
                <div class="input-group">
                    <label for="edit-task-title">Título</label>
                    <input type="text" id="edit-task-title" required>
                </div>
                <div class="input-group">
                    <label for="edit-task-desc">Descripción</label>
                    <textarea id="edit-task-desc" required rows="3"></textarea>
                </div>
                <div class="input-group">
                    <label for="edit-task-date">Fecha de Vencimiento</label>
                    <input type="date" id="edit-task-date" required>
                </div>
                <div id="edit-task-error" class="error-message"></div>
                <button type="submit" class="btn-primary w-full">Actualizar Tarea</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
